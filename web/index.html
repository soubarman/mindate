<!DOCTYPE html>
<html lang="en">
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="google-signin-client_id" content="990817672883-jsr66vh56ssf27qt78u9aqipdl0ktgtf.apps.googleusercontent.com">

  <!-- SEO -->
  <title>Situationship — Vibe. Match. Connect. 💫</title>
  <meta name="description" content="Situationship is a Gen Z social and dating platform. Share your vibe, swipe to match, and connect in real-time.">
  
  <!-- PWA / Mobile -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Situationship">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="manifest" href="manifest.json">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: linear-gradient(135deg, #B8EDFF 0%, #B8FFE4 50%, #D4E4FF 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
    }

    /* Loading overlay */
    #loading-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 9999;
      background: linear-gradient(135deg, #B8EDFF 0%, #B8FFE4 50%, #D4E4FF 100%);
      transition: opacity 0.6s ease;
    }

    #loading-overlay.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .logo-icon {
      width: 80px; height: 80px;
      background: white;
      border-radius: 24px;
      display: flex; align-items: center; justify-content: center;
      font-size: 42px;
      box-shadow: 0 12px 40px rgba(110,203,245,0.4);
    }

    .logo-text {
      font-size: 44px; font-weight: 800; letter-spacing: -2px;
      background: linear-gradient(135deg, #6ECBF5, #7EEECB);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-size: 15px; color: rgba(26,42,58,0.6); font-weight: 500;
    }

    .spinner {
      width: 38px; height: 38px;
      border: 3px solid rgba(110,203,245,0.25);
      border-top-color: #6ECBF5;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- Loading screen -->
  <div id="loading-overlay">
    <div class="logo-icon">💫</div>
    <div class="logo-text">Situationship</div>
    <div class="tagline">Vibe. Match. Connect. 🔥</div>
    <div class="spinner"></div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function() {
      var loader = document.getElementById('loading-overlay');
      if (loader) {
        loader.classList.add('fade-out');
        setTimeout(function() {
          loader.remove();
        }, 600);
      }
    });

    // Native HTML5 Real Microphone Recorder and Player Helpers
    let mediaRecorder;
    let audioChunks = [];
    let currentAudio = null;

    window.startRecording = async function() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.start();
        return true;
      } catch (e) {
        console.error("Mic access denied or error:", e);
        return false;
      }
    };

    window.stopRecording = function() {
      return new Promise((resolve) => {
        if (mediaRecorder && mediaRecorder.state !== 'inactive') {
          mediaRecorder.onstop = () => {
            const blob = new Blob(audioChunks, { type: 'audio/webm' });
            const url = URL.createObjectURL(blob);
            resolve(url);
          };
          mediaRecorder.stop();
          mediaRecorder.stream.getTracks().forEach(t => t.stop());
        } else {
          resolve("");
        }
      });
    };

    window.playAudio = function(url, callbackId) {
      if (currentAudio) {
        currentAudio.pause();
      }
      currentAudio = new Audio(url);
      if (callbackId) {
        currentAudio.onended = () => {
          // Send callback event to Dart if needed
          if (window.onAudioEnded) {
            window.onAudioEnded(callbackId);
          }
        };
      }
      currentAudio.play();
    };

    window.pauseAudio = function() {
      if (currentAudio) {
        currentAudio.pause();
      }
    };
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
